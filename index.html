<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Plate Hunter — Охота за номерами</title>
<link rel="manifest" href="manifest.json">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #eaeaea;
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* Header */
.header {
  padding: 12px 16px;
  padding-top: max(12px, env(safe-area-inset-top));
  background: #16213e;
  border-bottom: 1px solid #2a2a4a;
  flex-shrink: 0;
}

.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 14px;
  color: #a0a0b8;
}

.progress-info .counter {
  font-weight: 700;
  color: #00e676;
  font-size: 16px;
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: #2a2a4a;
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #00d4ff, #00e676);
  border-radius: 4px;
  transition: width 0.3s ease;
}

/* Search */
.search-section {
  padding: 10px 16px;
  background: #1a1a2e;
  flex-shrink: 0;
}

.search-row {
  display: flex;
  gap: 8px;
}

.search-input {
  flex: 1;
  padding: 14px 16px;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 4px;
  border: 2px solid #2a2a4a;
  border-radius: 12px;
  background: #16213e;
  color: #eaeaea;
  text-align: center;
  font-variant-numeric: tabular-nums;
  outline: none;
  transition: border-color 0.2s;
}

.search-input:focus {
  border-color: #00d4ff;
}

.search-input::placeholder {
  color: #555570;
  font-weight: 400;
  letter-spacing: 1px;
  font-size: 14px;
}

.search-btn {
  padding: 14px 20px;
  font-size: 16px;
  font-weight: 600;
  border: none;
  border-radius: 12px;
  background: #00e676;
  color: #1a1a2e;
  cursor: pointer;
  min-width: 60px;
}

.search-btn:active {
  transform: scale(0.95);
  background: #00c853;
}

/* Section label */
.section-label {
  padding: 6px 16px;
  font-size: 12px;
  color: #666688;
  text-transform: uppercase;
  letter-spacing: 2px;
  flex-shrink: 0;
}

/* Grid */
.grid-container {
  flex: 1;
  overflow-y: auto;
  padding: 0 12px 16px 12px;
  -webkit-overflow-scrolling: touch;
}

.grid-section {
  margin-bottom: 16px;
}

.grid-section-title {
  font-size: 13px;
  color: #8888a8;
  padding: 8px 4px;
  font-weight: 600;
  position: sticky;
  top: 0;
  background: #1a1a2e;
  z-index: 2;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}

.cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  border-radius: 8px;
  background: #2a2a4a;
  color: #555570;
  cursor: pointer;
  transition: all 0.15s ease;
  min-height: 48px;
}

.cell:active {
  transform: scale(0.92);
}

.cell.found {
  background: #004d40;
  color: #00e676;
  box-shadow: 0 0 8px rgba(0, 230, 118, 0.3);
}

.cell.highlight {
  animation: pulse 0.6s ease;
  border: 2px solid #00d4ff;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

/* Footer */
.footer {
  padding: 10px 16px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  background: #16213e;
  border-top: 1px solid #2a2a4a;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.reset-btn {
  flex: 1;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  border: 2px solid #ff1744;
  border-radius: 12px;
  background: transparent;
  color: #ff1744;
  cursor: pointer;
}

.reset-btn:active {
  background: #4a0000;
  transform: scale(0.97);
}

.jump-btn {
  padding: 14px 16px;
  font-size: 15px;
  font-weight: 600;
  border: 2px solid #2a2a4a;
  border-radius: 12px;
  background: #1a1a2e;
  color: #a0a0b8;
  cursor: pointer;
}

.jump-btn:active {
  background: #2a2a4a;
}

/* Confirm modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(10, 10, 30, 0.9);
  z-index: 200;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show {
  display: flex;
}

.modal {
  background: #16213e;
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  max-width: 320px;
  width: 90%;
  border: 1px solid #2a2a4a;
}

.modal h3 {
  font-size: 18px;
  margin-bottom: 8px;
  color: #eaeaea;
}

.modal p {
  font-size: 14px;
  color: #a0a0b8;
  margin-bottom: 20px;
}

.modal-buttons {
  display: flex;
  gap: 10px;
}

.modal-btn {
  flex: 1;
  padding: 12px;
  font-size: 15px;
  font-weight: 600;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.modal-btn.cancel {
  background: #2a2a4a;
  color: #eaeaea;
}

.modal-btn.confirm {
  background: #ff1744;
  color: white;
}

.modal-btn:active {
  transform: scale(0.96);
}

/* Quick jump modal */
.jump-modal .jump-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 16px;
}

.jump-grid button {
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  border: 2px solid #2a2a4a;
  border-radius: 10px;
  background: #1a1a2e;
  color: #a0a0b8;
  cursor: pointer;
}

.jump-grid button:active {
  background: #2a2a4a;
  transform: scale(0.95);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #004d40;
  color: #00e676;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  z-index: 300;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.already {
  background: #4a3a00;
  color: #ffd600;
}

/* Responsive */
@media (min-width: 400px) {
  .grid {
    grid-template-columns: repeat(6, 1fr);
  }
}

@media (min-width: 500px) {
  .grid {
    grid-template-columns: repeat(8, 1fr);
  }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="progress-info">
    <span>Найдено: <span class="counter" id="foundCounter">0 / 999</span></span>
    <span id="percentText">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>
</div>

<!-- Search -->
<div class="search-section">
  <div class="search-row">
    <input type="text" class="search-input" id="searchInput" placeholder="Введи номер..." maxlength="3" inputmode="numeric" pattern="[0-9]*">
    <button class="search-btn" id="searchBtn">✓</button>
  </div>
</div>

<!-- Section label -->
<div class="section-label" id="sectionLabel">Все номера</div>

<!-- Grid -->
<div class="grid-container" id="gridContainer">
  <!-- Dynamically filled -->
</div>

<!-- Footer -->
<div class="footer">
  <button class="jump-btn" id="jumpBtn">⬆ К сотне</button>
  <button class="reset-btn" id="resetBtn">Сброс</button>
</div>

<!-- Reset confirm modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3>Начать новую охоту?</h3>
    <p>Весь прогресс будет удалён. Это действие нельзя отменить.</p>
    <div class="modal-buttons">
      <button class="modal-btn cancel" id="cancelReset">Отмена</button>
      <button class="modal-btn confirm" id="confirmReset">Сбросить</button>
    </div>
  </div>
</div>

<!-- Jump modal -->
<div class="modal-overlay jump-modal" id="jumpModal">
  <div class="modal">
    <h3>Перейти к сотне</h3>
    <div class="jump-grid" id="jumpGrid"></div>
    <div class="modal-buttons" style="margin-top: 16px;">
      <button class="modal-btn cancel" id="cancelJump">Закрыть</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  "use strict";

  // State
  var foundNumbers = {};
  var totalPlates = 999;
  var debounceTimer = null;
  var lastTapTime = 0;
  var lastTapTarget = null;

  // DOM
  var foundCounterEl = document.getElementById("foundCounter");
  var percentTextEl = document.getElementById("percentText");
  var progressFillEl = document.getElementById("progressFill");
  var searchInput = document.getElementById("searchInput");
  var searchBtn = document.getElementById("searchBtn");
  var gridContainer = document.getElementById("gridContainer");
  var sectionLabel = document.getElementById("sectionLabel");
  var resetBtn = document.getElementById("resetBtn");
  var resetModal = document.getElementById("resetModal");
  var confirmReset = document.getElementById("confirmReset");
  var cancelReset = document.getElementById("cancelReset");
  var jumpBtn = document.getElementById("jumpBtn");
  var jumpModal = document.getElementById("jumpModal");
  var jumpGrid = document.getElementById("jumpGrid");
  var cancelJump = document.getElementById("cancelJump");
  var toast = document.getElementById("toast");

  // Debounce helper
  function debounce(fn, delay) {
    return function() {
      var args = arguments;
      var ctx = this;
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function() { fn.apply(ctx, args); }, delay);
    };
  }

  // Load from localStorage
  function loadState() {
    var saved = localStorage.getItem("plateHunterFound");
    if (saved) {
      try {
        foundNumbers = JSON.parse(saved) || {};
      } catch(e) {
        foundNumbers = {};
      }
    }
  }

  // Save to localStorage
  function saveState() {
    localStorage.setItem("plateHunterFound", JSON.stringify(foundNumbers));
  }

  // Format number
  function fmt(n) {
    if (n < 10) return "00" + n;
    if (n < 100) return "0" + n;
    return "" + n;
  }

  // Count found
  function countFound() {
    var count = 0;
    for (var key in foundNumbers) {
      if (foundNumbers[key]) count++;
    }
    return count;
  }

  // Update progress UI
  function updateProgress() {
    var count = countFound();
    var pct = Math.round((count / totalPlates) * 100);
    foundCounterEl.textContent = count + " / " + totalPlates;
    percentTextEl.textContent = pct + "%";
    progressFillEl.style.width = pct + "%";
  }

  // Show toast
  function showToast(text, isAlready) {
    toast.textContent = text;
    toast.className = "toast show" + (isAlready ? " already" : "");
    setTimeout(function() {
      toast.className = "toast" + (isAlready ? " already" : "");
    }, 1500);
  }

  // Toggle number found
  function toggleNumber(num) {
    var key = fmt(num);
    var cell = document.getElementById("cell-" + key);
    if (foundNumbers[num]) {
      // Unmark
      foundNumbers[num] = false;
      delete foundNumbers[num];
      if (cell) cell.classList.remove("found");
      showToast(key + " — убрано", true);
    } else {
      // Mark
      foundNumbers[num] = true;
      if (cell) cell.classList.add("found");
      showToast("✓ " + key + " найден!", false);
    }
    saveState();
    updateProgress();
  }

  // Debounced toggle (prevent double-tap)
  var debouncedToggle = debounce(function(num) {
    toggleNumber(num);
  }, 150);

  // Handle cell tap
  function handleCellTap(num) {
    var now = Date.now();
    var key = fmt(num);
    // Double-tap within 300ms = unmark
    if (now - lastTapTime < 300 && lastTapTarget === key) {
      clearTimeout(debounceTimer);
      lastTapTime = 0;
      lastTapTarget = null;
      // Directly unmark
      foundNumbers[num] = false;
      delete foundNumbers[num];
      var cell = document.getElementById("cell-" + key);
      if (cell) cell.classList.remove("found");
      saveState();
      updateProgress();
      showToast(key + " — убрано", true);
      return;
    }
    lastTapTime = now;
    lastTapTarget = key;
    debouncedToggle(num);
  }

  // Render grid
  function renderGrid() {
    gridContainer.innerHTML = "";
    var sections = [
      { start: 1, end: 99, label: "001 — 099" },
      { start: 100, end: 199, label: "100 — 199" },
      { start: 200, end: 299, label: "200 — 299" },
      { start: 300, end: 399, label: "300 — 399" },
      { start: 400, end: 499, label: "400 — 499" },
      { start: 500, end: 599, label: "500 — 599" },
      { start: 600, end: 699, label: "600 — 699" },
      { start: 700, end: 799, label: "700 — 799" },
      { start: 800, end: 899, label: "800 — 899" },
      { start: 900, end: 999, label: "900 — 999" }
    ];

    for (var s = 0; s < sections.length; s++) {
      var section = sections[s];
      var sectionEl = document.createElement("div");
      sectionEl.className = "grid-section";

      var titleEl = document.createElement("div");
      titleEl.className = "grid-section-title";
      titleEl.textContent = section.label;
      sectionEl.appendChild(titleEl);

      var gridEl = document.createElement("div");
      gridEl.className = "grid";

      for (var i = section.start; i <= section.end; i++) {
        var cell = document.createElement("div");
        cell.className = "cell";
        cell.id = "cell-" + fmt(i);
        cell.textContent = fmt(i);
        cell.dataset.num = i;

        if (foundNumbers[i]) {
          cell.classList.add("found");
        }

        (function(num) {
          cell.addEventListener("click", function(e) {
            e.preventDefault();
            handleCellTap(num);
          });
        })(i);

        gridEl.appendChild(cell);
      }

      sectionEl.appendChild(gridEl);
      gridContainer.appendChild(sectionEl);
    }
  }

  // Search handler
  function doSearch() {
    var val = searchInput.value.trim();
    if (val.length === 0) return;

    var num = parseInt(val, 10);
    if (isNaN(num) || num < 1 || num > 999) {
      showToast("Номер от 001 до 999", true);
      return;
    }

    // Mark as found
    var key = fmt(num);
    var wasFound = !!foundNumbers[num];
    foundNumbers[num] = true;
    saveState();
    updateProgress();

    // Scroll to cell
    var cell = document.getElementById("cell-" + key);
    if (cell) {
      cell.classList.add("found");
      cell.classList.add("highlight");
      cell.scrollIntoView({ behavior: "smooth", block: "center" });
      setTimeout(function() { cell.classList.remove("highlight"); }, 800);
    }

    if (wasFound) {
      showToast(key + " уже найден", true);
    } else {
      showToast("✓ " + key + " найден!", false);
    }

    searchInput.value = "";
    searchInput.blur();
  }

  // Debounced search
  var debouncedSearch = debounce(doSearch, 200);

  // Search events
  searchBtn.addEventListener("click", function(e) {
    e.preventDefault();
    doSearch();
  });

  searchInput.addEventListener("input", function() {
    var val = searchInput.value.replace(/[^0-9]/g, "");
    searchInput.value = val;
    if (val.length === 3) {
      debouncedSearch();
    }
  });

  searchInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      e.preventDefault();
      doSearch();
    }
  });

  // Reset
  resetBtn.addEventListener("click", function() {
    resetModal.classList.add("show");
  });

  cancelReset.addEventListener("click", function() {
    resetModal.classList.remove("show");
  });

  confirmReset.addEventListener("click", function() {
    foundNumbers = {};
    saveState();
    updateProgress();
    renderGrid();
    resetModal.classList.remove("show");
    showToast("Прогресс сброшен", true);
  });

  // Jump to hundred
  jumpBtn.addEventListener("click", function() {
    jumpGrid.innerHTML = "";
    var hundreds = [
      { label: "001-099", start: 1 },
      { label: "100-199", start: 100 },
      { label: "200-299", start: 200 },
      { label: "300-399", start: 300 },
      { label: "400-499", start: 400 },
      { label: "500-599", start: 500 },
      { label: "600-699", start: 600 },
      { label: "700-799", start: 700 },
      { label: "800-899", start: 800 },
      { label: "900-999", start: 900 }
    ];
    for (var i = 0; i < hundreds.length; i++) {
      (function(h) {
        var btn = document.createElement("button");
        btn.textContent = h.label;
        btn.addEventListener("click", function() {
          var cell = document.getElementById("cell-" + fmt(h.start));
          if (cell) {
            cell.scrollIntoView({ behavior: "smooth", block: "start" });
          }
          jumpModal.classList.remove("show");
        });
        jumpGrid.appendChild(btn);
      })(hundreds[i]);
    }
    jumpModal.classList.add("show");
  });

  cancelJump.addEventListener("click", function() {
    jumpModal.classList.remove("show");
  });

  // Close modals on overlay click
  resetModal.addEventListener("click", function(e) {
    if (e.target === resetModal) resetModal.classList.remove("show");
  });
  jumpModal.addEventListener("click", function(e) {
    if (e.target === jumpModal) jumpModal.classList.remove("show");
  });

  // Register Service Worker
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
      navigator.serviceWorker.register("./sw.js").catch(function(err) {
        console.log("SW registration failed:", err);
      });
    });
  }

  // Init
  loadState();
  updateProgress();
  renderGrid();

})();
</script>
</body>
</html>
