<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Plate Hunter</title>
<link rel="manifest" href="manifest.json">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

html, body {
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #eaeaea;
}

/* === SCREENS === */
.screen {
  display: none;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  position: relative;
}

.screen.active {
  display: flex;
}

/* === START SCREEN === */
#start-screen {
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 20px;
}

.start-logo {
  font-size: 42px;
  font-weight: 900;
  color: #a855f7;
  margin-bottom: 8px;
  letter-spacing: -1px;
}

.start-subtitle {
  font-size: 14px;
  color: #666688;
  margin-bottom: 24px;
}

.start-btn {
  width: 100%;
  max-width: 280px;
  padding: 16px 24px;
  font-size: 17px;
  font-weight: 700;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: transform 0.1s ease;
  min-height: 56px;
}

.start-btn:active {
  transform: scale(0.96);
}

.start-btn.primary {
  background: linear-gradient(135deg, #a855f7, #7c3aed);
  color: #fff;
}

.start-btn.secondary {
  background: rgba(42, 42, 74, 0.8);
  color: #eaeaea;
  border: 1px solid rgba(168, 85, 247, 0.3);
}

.start-btn.exit {
  background: rgba(239, 68, 68, 0.15);
  color: #ef4444;
  border: 1px solid rgba(239, 68, 68, 0.3);
}

/* === GAME SCREEN === */
#game-screen {
  padding: 12px;
  gap: 10px;
}

/* Top bar */
.game-top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-shrink: 0;
}

.game-top-bar .counter {
  font-size: 14px;
  font-weight: 700;
  color: #22c55e;
  white-space: nowrap;
}

.game-top-bar .btn-small {
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid rgba(168, 85, 247, 0.3);
  border-radius: 8px;
  background: rgba(42, 42, 74, 0.7);
  color: #a855f7;
  cursor: pointer;
  min-height: 38px;
}

.game-top-bar .btn-small:active {
  transform: scale(0.94);
}

/* Display area */
.display-area {
  flex-shrink: 0;
  text-align: center;
  padding: 16px 12px;
}

.display-digits {
  font-size: 56px;
  font-weight: 800;
  letter-spacing: 14px;
  color: #eaeaea;
  font-variant-numeric: tabular-nums;
  min-height: 64px;
  transition: color 0.2s ease;
}

.display-digits.flash-green {
  animation: flashGreen 0.5s ease;
}

.display-digits.flash-red {
  animation: flashRed 0.5s ease;
}

@keyframes flashGreen {
  0%, 100% { color: #eaeaea; transform: scale(1); }
  50% { color: #22c55e; transform: scale(1.08); text-shadow: 0 0 24px rgba(34,197,94,0.6); }
}

@keyframes flashRed {
  0%, 100% { color: #eaeaea; transform: scale(1); }
  50% { color: #ef4444; transform: scale(1.08); text-shadow: 0 0 24px rgba(239,68,68,0.6); }
}

.display-status {
  font-size: 13px;
  font-weight: 600;
  margin-top: 6px;
  min-height: 18px;
  transition: opacity 0.2s ease;
}

.display-status.new {
  color: #22c55e;
}

.display-status.exists {
  color: #ef4444;
}

/* Keyboard */
.keyboard-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: flex-end;
  padding-bottom: 12px;
}

.keyboard-row {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.key-btn {
  flex: 1;
  max-width: 80px;
  aspect-ratio: 1.3;
  background: rgba(42, 42, 74, 0.85);
  border: 1px solid rgba(168, 85, 247, 0.2);
  border-radius: 10px;
  color: #eaeaea;
  font-size: 22px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 50px;
  transition: all 0.1s ease;
}

.key-btn:active {
  transform: scale(0.92);
  background: rgba(168, 85, 247, 0.35);
}

.key-btn.ok-btn {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: #fff;
  border: none;
  font-size: 16px;
}

.key-btn.backspace-btn {
  background: rgba(239, 68, 68, 0.15);
  border-color: rgba(239, 68, 68, 0.3);
  color: #ef4444;
  font-size: 20px;
}

/* === GRID VIEW === */
.grid-view {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

.grid-view.active {
  display: flex;
}

.grid-hundreds {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 8px;
  padding: 8px;
  overflow: hidden;
}

.hundred-block {
  background: rgba(42, 42, 74, 0.7);
  border: 1px solid rgba(168, 85, 247, 0.2);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.12s ease;
  min-height: 0;
}

.hundred-block:active {
  transform: scale(0.95);
  border-color: rgba(168, 85, 247, 0.6);
}

.hundred-block .block-label {
  font-size: 13px;
  font-weight: 700;
  color: #a0a0b8;
}

.hundred-block .block-progress {
  font-size: 18px;
  font-weight: 800;
  color: #a855f7;
  margin-top: 2px;
}

.hundred-block .block-progress.complete {
  color: #22c55e;
}

/* Number detail view */
.number-detail {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

.number-detail.active {
  display: flex;
}

.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(168, 85, 247, 0.15);
}

.detail-header h3 {
  font-size: 15px;
  color: #a0a0b8;
  font-weight: 700;
}

.detail-back-btn {
  padding: 6px 12px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid rgba(168, 85, 247, 0.3);
  border-radius: 8px;
  background: rgba(42, 42, 74, 0.7);
  color: #a855f7;
  cursor: pointer;
}

.detail-back-btn:active {
  transform: scale(0.94);
}

.detail-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  padding: 10px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  align-content: start;
}

.detail-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  border-radius: 8px;
  background: #2a2a4a;
  color: #555570;
  cursor: pointer;
  transition: all 0.12s ease;
  min-height: 44px;
}

.detail-cell:active {
  transform: scale(0.9);
}

.detail-cell.found {
  background: rgba(34, 197, 94, 0.25);
  color: #22c55e;
  border: 1px solid rgba(34, 197, 94, 0.4);
}

.detail-cell.just-marked {
  animation: popIn 0.35s ease;
}

.detail-cell.just-removed {
  animation: popOut 0.35s ease;
}

@keyframes popIn {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); background: rgba(34, 197, 94, 0.5); }
  100% { transform: scale(1); }
}

@keyframes popOut {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); background: rgba(239, 68, 68, 0.5); }
  100% { transform: scale(1); }
}

/* Bottom bar */
.bottom-bar {
  display: flex;
  gap: 8px;
  padding: 8px 0;
  flex-shrink: 0;
}

.bottom-bar .btn-small {
  flex: 1;
  padding: 10px 8px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid rgba(168, 85, 247, 0.3);
  border-radius: 8px;
  background: rgba(42, 42, 74, 0.7);
  color: #a855f7;
  cursor: pointer;
  min-height: 42px;
}

.bottom-bar .btn-small:active {
  transform: scale(0.94);
}

/* Keyboard view / Grid view toggle */
.keyboard-view {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

.keyboard-view.active {
  display: flex;
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen" class="screen active">
  <div class="start-logo">🚗 Plate Hunter</div>
  <div class="start-subtitle">Отмечай встречные номера</div>
  <button class="start-btn primary" onclick="startNewGame()">Начать игру</button>
  <button class="start-btn secondary" onclick="continueGame()">Продолжить</button>
  <button class="start-btn exit" onclick="exitGame()">Выход</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <!-- Top bar -->
  <div class="game-top-bar">
    <span class="counter" id="counter-display">0 / 999</span>
    <button class="btn-small" onclick="saveGame()">💾 Сохранить</button>
    <button class="btn-small" onclick="showGrid()">▦ Вид</button>
    <button class="btn-small" onclick="goToStart()" style="border-color:rgba(239,68,68,0.3);color:#ef4444;">✕ Выход</button>
  </div>

  <!-- Keyboard view -->
  <div class="keyboard-view active" id="keyboard-view">
    <!-- Display -->
    <div class="display-area">
      <div class="display-digits" id="display-digits">___</div>
      <div class="display-status" id="display-status"></div>
    </div>

    <!-- Keyboard -->
    <div class="keyboard-area">
      <div class="keyboard-row">
        <button class="key-btn" onclick="pressKey('1')">1</button>
        <button class="key-btn" onclick="pressKey('2')">2</button>
        <button class="key-btn" onclick="pressKey('3')">3</button>
      </div>
      <div class="keyboard-row">
        <button class="key-btn" onclick="pressKey('4')">4</button>
        <button class="key-btn" onclick="pressKey('5')">5</button>
        <button class="key-btn" onclick="pressKey('6')">6</button>
      </div>
      <div class="keyboard-row">
        <button class="key-btn" onclick="pressKey('7')">7</button>
        <button class="key-btn" onclick="pressKey('8')">8</button>
        <button class="key-btn" onclick="pressKey('9')">9</button>
      </div>
      <div class="keyboard-row">
        <button class="key-btn backspace-btn" onclick="pressBackspace()">⌫</button>
        <button class="key-btn" onclick="pressKey('0')">0</button>
        <button class="key-btn ok-btn" onclick="pressOK()">OK</button>
      </div>
    </div>
  </div>

  <!-- Grid view -->
  <div class="grid-view" id="grid-view">
    <div class="grid-hundreds" id="grid-hundreds"></div>

    <div class="number-detail" id="number-detail">
      <div class="detail-header">
        <button class="detail-back-btn" onclick="closeDetail()">← Назад</button>
        <h3 id="detail-title">001–099</h3>
        <div style="width:60px"></div>
      </div>
      <div class="detail-grid" id="detail-grid"></div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <button class="btn-small" onclick="showKeyboard()">⌨ Клавиатура</button>
    <button class="btn-small" onclick="showGrid()">▦ Сетка</button>
  </div>
</div>

<script>
var STATE = {
  found: [],
  startTime: null,
  currentView: 'keyboard', // 'keyboard' | 'grid'
  currentHundred: null
};

var DISPLAY_TIMEOUT = null;

function init() {
  var saved = localStorage.getItem('plateHunterSave');
  if (saved) {
    try {
      var data = JSON.parse(saved);
      if (data && data.found && data.found.length > 0) {
        // has saved game
      }
    } catch(e) {}
  }
}

function startNewGame() {
  STATE.found = [];
  STATE.startTime = Date.now();
  switchScreen('game-screen');
  resetDisplay();
  updateCounter();
  if (STATE.currentView === 'grid') {
    renderGridHundreds();
  }
}

function continueGame() {
  var saved = localStorage.getItem('plateHunterSave');
  if (saved) {
    try {
      var data = JSON.parse(saved);
      if (data && data.found) {
        STATE.found = data.found;
        STATE.startTime = data.startTime || Date.now();
        switchScreen('game-screen');
        resetDisplay();
        updateCounter();
        if (STATE.currentView === 'grid') {
          renderGridHundreds();
        }
        return;
      }
    } catch(e) {}
  }
  alert('Нет сохранённой игры');
}

function exitGame() {
  alert('Спасибо за игру! 🚗');
}

function switchScreen(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) {
    screens[i].classList.remove('active');
  }
  document.getElementById(id).classList.add('active');
}

function goToStart() {
  switchScreen('start-screen');
}

function saveGame() {
  var data = {
    found: STATE.found,
    startTime: STATE.startTime
  };
  localStorage.setItem('plateHunterSave', JSON.stringify(data));
  showToast('Сохранено!');
}

// === KEYBOARD ===
function resetDisplay() {
  var el = document.getElementById('display-digits');
  el.textContent = '___';
  el.classList.remove('flash-green', 'flash-red');
  var st = document.getElementById('display-status');
  st.textContent = '';
  st.className = 'display-status';
}

function pressKey(digit) {
  var el = document.getElementById('display-digits');
  var current = el.textContent;
  if (current === '___') {
    current = '';
  }
  if (current.length >= 3) return;
  current += digit;
  el.textContent = current.padEnd(3, '_');

  // Clear status while typing
  var st = document.getElementById('display-status');
  st.textContent = '';
  st.className = 'display-status';
}

function pressBackspace() {
  var el = document.getElementById('display-digits');
  var current = el.textContent;
  if (current === '___') return;
  current = current.slice(0, -1);
  el.textContent = current.padEnd(3, '_');
}

function pressOK() {
  var el = document.getElementById('display-digits');
  var val = el.textContent.replace(/_/g, '');
  if (val.length !== 3) return;

  var num = parseInt(val, 10);
  var st = document.getElementById('display-status');

  if (STATE.found.indexOf(num) === -1) {
    // New!
    STATE.found.push(num);
    el.classList.remove('flash-green');
    void el.offsetWidth; // reflow
    el.classList.add('flash-green');
    st.textContent = '✓ Новый номер!';
    st.className = 'display-status new';
  } else {
    // Already found — remove
    var idx = STATE.found.indexOf(num);
    STATE.found.splice(idx, 1);
    el.classList.remove('flash-red');
    void el.offsetWidth;
    el.classList.add('flash-red');
    st.textContent = '✕ Уже есть';
    st.className = 'display-status exists';
  }

  updateCounter();

  // Reset display after delay
  if (DISPLAY_TIMEOUT) clearTimeout(DISPLAY_TIMEOUT);
  DISPLAY_TIMEOUT = setTimeout(function() {
    resetDisplay();
  }, 1200);
}

function updateCounter() {
  document.getElementById('counter-display').textContent = STATE.found.length + ' / 999';
}

// === GRID VIEW ===
function showGrid() {
  STATE.currentView = 'grid';
  document.getElementById('keyboard-view').classList.remove('active');
  document.getElementById('grid-view').classList.add('active');
  renderGridHundreds();
}

function showKeyboard() {
  STATE.currentView = 'keyboard';
  document.getElementById('grid-view').classList.remove('active');
  document.getElementById('keyboard-view').classList.add('active');
  document.getElementById('number-detail').classList.remove('active');
  document.getElementById('grid-hundreds').style.display = 'grid';
}

function renderGridHundreds() {
  var container = document.getElementById('grid-hundreds');
  container.innerHTML = '';
  for (var h = 0; h < 9; h++) {
    var block = document.createElement('div');
    block.className = 'hundred-block';
    block.onclick = (function(hundred) {
      return function() { openHundred(hundred); };
    })(h);

    var label = document.createElement('div');
    label.className = 'block-label';
    var start = h * 100 + 1;
    var end = h * 100 + 99;
    label.textContent = pad3(start) + '–' + pad3(end);

    var progress = document.createElement('div');
    progress.className = 'block-progress';
    var count = countInRange(h * 100 + 1, h * 100 + 99);
    progress.textContent = count + '/99';
    if (count === 99) progress.className = 'block-progress complete';

    block.appendChild(label);
    block.appendChild(progress);
    container.appendChild(block);
  }
}

function countInRange(from, to) {
  var count = 0;
  for (var i = 0; i < STATE.found.length; i++) {
    var n = STATE.found[i];
    if (n >= from && n <= to) count++;
  }
  return count;
}

function openHundred(h) {
  STATE.currentHundred = h;
  document.getElementById('grid-hundreds').style.display = 'none';
  var detail = document.getElementById('number-detail');
  detail.classList.add('active');

  var start = h * 100 + 1;
  var end = h * 100 + 99;
  document.getElementById('detail-title').textContent = pad3(start) + '–' + pad3(end);

  var grid = document.getElementById('detail-grid');
  grid.innerHTML = '';
  for (var n = start; n <= end; n++) {
    var cell = document.createElement('div');
    cell.className = 'detail-cell';
    if (STATE.found.indexOf(n) !== -1) {
      cell.className += ' found';
    }
    cell.textContent = pad3(n);
    cell.onclick = (function(num, el) {
      return function() { toggleNumber(num, el); };
    })(n, cell);
    grid.appendChild(cell);
  }
}

function closeDetail() {
  document.getElementById('number-detail').classList.remove('active');
  document.getElementById('grid-hundreds').style.display = 'grid';
  renderGridHundreds();
}

function toggleNumber(num, el) {
  var idx = STATE.found.indexOf(num);
  if (idx === -1) {
    STATE.found.push(num);
    el.className = 'detail-cell found just-marked';
    updateCounter();
    // Update hundred progress
    if (STATE.currentView === 'grid' && STATE.currentHundred !== null) {
      setTimeout(function() { renderGridHundreds(); }, 400);
    }
  } else {
    STATE.found.splice(idx, 1);
    el.className = 'detail-cell just-removed';
    updateCounter();
    if (STATE.currentView === 'grid' && STATE.currentHundred !== null) {
      setTimeout(function() { renderGridHundreds(); }, 400);
    }
  }
}

function pad3(n) {
  if (n < 10) return '00' + n;
  if (n < 100) return '0' + n;
  return '' + n;
}

// === TOAST ===
function showToast(msg) {
  var toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);' +
    'background:rgba(34,197,94,0.9);color:#fff;padding:12px 24px;border-radius:12px;' +
    'font-size:14px;font-weight:700;z-index:999;pointer-events:none;' +
    'animation:popIn 0.3s ease;';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s ease';
    setTimeout(function() { toast.remove(); }, 300);
  }, 1000);
}

// === INIT ===
init();

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}
</script>
</body>
</html>
