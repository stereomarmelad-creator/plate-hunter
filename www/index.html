<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Plate Hunter</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>�</text></svg>">
<link rel="manifest" href='data:application/json,{"name":"Plate+Hunter","short_name":"Plates","start_url":".","display":"standalone","background_color":"%231a1a2e","theme_color":"%231a1a2e","icons":[{"src":"data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚗</text></svg>","sizes":"any","type":"image/svg+xml"}]}'>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

html, body {
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #eaeaea;
}

/* === SCREENS === */
.screen {
  display: none;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  position: relative;
}

.screen.active {
  display: flex;
}

/* === NAME SCREEN === */
#name-screen {
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.name-logo {
  font-size: 36px;
  font-weight: 900;
  color: #a855f7;
  margin-bottom: 4px;
  letter-spacing: -1px;
}

.name-prompt {
  font-size: 16px;
  color: #a0a0b8;
  margin-bottom: 8px;
}

.name-input {
  width: 100%;
  max-width: 280px;
  padding: 16px 20px;
  font-size: 18px;
  font-weight: 600;
  border: 2px solid rgba(168, 85, 247, 0.4);
  border-radius: 14px;
  background: rgba(42, 42, 74, 0.8);
  color: #eaeaea;
  text-align: center;
  outline: none;
  -webkit-appearance: none;
}

.name-input:focus {
  border-color: #a855f7;
  box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
}

.name-input::placeholder {
  color: #555570;
}

/* === START SCREEN === */
#start-screen {
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 20px;
}

.start-logo {
  font-size: 42px;
  font-weight: 900;
  color: #a855f7;
  letter-spacing: -1px;
}

.start-subtitle {
  font-size: 14px;
  color: #666688;
  margin-bottom: 8px;
}

.start-player {
  font-size: 13px;
  color: #22c55e;
  font-weight: 600;
  margin-bottom: 4px;
}

.start-btn {
  width: 100%;
  max-width: 280px;
  padding: 16px 24px;
  font-size: 17px;
  font-weight: 700;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: transform 0.1s ease;
  min-height: 56px;
  -webkit-appearance: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  pointer-events: auto;
}

.start-btn:active, .start-btn.touching {
  transform: scale(0.96);
}

.start-btn.primary {
  background: linear-gradient(135deg, #a855f7, #7c3aed);
  color: #fff;
}

.start-btn.secondary {
  background: rgba(42, 42, 74, 0.8);
  color: #eaeaea;
  border: 1px solid rgba(168, 85, 247, 0.3);
}

.start-btn.tertiary {
  background: rgba(34, 197, 94, 0.12);
  color: #22c55e;
  border: 1px solid rgba(34, 197, 94, 0.3);
}

.start-btn.exit {
  background: rgba(239, 68, 68, 0.15);
  color: #ef4444;
  border: 1px solid rgba(239, 68, 68, 0.3);
}

/* === LEADERBOARD SCREEN === */
#leaderboard-screen {
  padding: 20px;
  gap: 12px;
}

.leaderboard-title {
  font-size: 24px;
  font-weight: 900;
  color: #a855f7;
  text-align: center;
  flex-shrink: 0;
}

.leaderboard-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.leaderboard-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: rgba(42, 42, 74, 0.6);
  border-radius: 10px;
  border: 1px solid rgba(168, 85, 247, 0.15);
}

.leaderboard-row.you {
  border-color: rgba(34, 197, 94, 0.4);
  background: rgba(34, 197, 94, 0.08);
}

.leaderboard-rank {
  font-size: 16px;
  font-weight: 800;
  color: #a855f7;
  min-width: 28px;
  text-align: center;
}

.leaderboard-rank.gold { color: #fbbf24; }
.leaderboard-rank.silver { color: #94a3b8; }
.leaderboard-rank.bronze { color: #d97706; }

.leaderboard-name {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: #eaeaea;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.leaderboard-count {
  font-size: 15px;
  font-weight: 800;
  color: #22c55e;
  min-width: 48px;
  text-align: right;
}

.leaderboard-empty {
  text-align: center;
  color: #555570;
  font-size: 14px;
  padding: 40px 20px;
}

.leaderboard-status {
  font-size: 11px;
  color: #555570;
  text-align: center;
  flex-shrink: 0;
}

/* === GAME SCREEN === */
#game-screen {
  padding: 12px;
  gap: 10px;
}

/* Top bar */
.game-top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-shrink: 0;
}

.game-top-bar .counter {
  font-size: 14px;
  font-weight: 700;
  color: #22c55e;
  white-space: nowrap;
}

.btn-small {
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid rgba(168, 85, 247, 0.3);
  border-radius: 8px;
  background: rgba(42, 42, 74, 0.7);
  color: #a855f7;
  cursor: pointer;
  min-height: 38px;
  -webkit-appearance: none;
  touch-action: manipulation;
}

.btn-small:active {
  transform: scale(0.94);
}

/* Display area */
.display-area {
  flex-shrink: 0;
  text-align: center;
  padding: 16px 12px;
}

.display-digits {
  font-size: 56px;
  font-weight: 800;
  letter-spacing: 14px;
  color: #eaeaea;
  font-variant-numeric: tabular-nums;
  min-height: 64px;
  transition: color 0.2s ease;
}

.display-digits.flash-green {
  animation: flashGreen 0.5s ease;
}

.display-digits.flash-red {
  animation: flashRed 0.5s ease;
}

@keyframes flashGreen {
  0%, 100% { color: #eaeaea; transform: scale(1); }
  50% { color: #22c55e; transform: scale(1.08); text-shadow: 0 0 24px rgba(34,197,94,0.6); }
}

@keyframes flashRed {
  0%, 100% { color: #eaeaea; transform: scale(1); }
  50% { color: #ef4444; transform: scale(1.08); text-shadow: 0 0 24px rgba(239,68,68,0.6); }
}

.display-status {
  font-size: 13px;
  font-weight: 600;
  margin-top: 6px;
  min-height: 18px;
  transition: opacity 0.2s ease;
}

.display-status.new {
  color: #22c55e;
}

.display-status.exists {
  color: #ef4444;
}

/* Keyboard */
.keyboard-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: flex-end;
  padding-bottom: 12px;
}

.keyboard-row {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.key-btn {
  flex: 1;
  max-width: 80px;
  aspect-ratio: 1.3;
  background: rgba(42, 42, 74, 0.85);
  border: 1px solid rgba(168, 85, 247, 0.2);
  border-radius: 10px;
  color: #eaeaea;
  font-size: 22px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 50px;
  transition: all 0.1s ease;
  -webkit-appearance: none;
  touch-action: manipulation;
}

.key-btn:active, .key-btn.touching {
  transform: scale(0.92);
  background: rgba(168, 85, 247, 0.35);
}

.key-btn.released {
  transform: scale(1);
  background: rgba(42, 42, 74, 0.85);
}

.key-btn.ok-btn {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: #fff;
  border: none;
  font-size: 16px;
}

.key-btn.backspace-btn {
  background: rgba(239, 68, 68, 0.15);
  border-color: rgba(239, 68, 68, 0.3);
  color: #ef4444;
  font-size: 20px;
}

/* === GRID VIEW === */
.grid-view {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

.grid-view.active {
  display: flex;
}

.grid-full {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 8px;
}

.grid-hundred-section {
  margin-bottom: 12px;
}

.grid-hundred-header {
  font-size: 13px;
  font-weight: 700;
  color: #a855f7;
  padding: 4px 8px;
  background: rgba(168, 85, 247, 0.1);
  border-radius: 6px;
  margin-bottom: 4px;
  position: sticky;
  top: 0;
}

.grid-numbers {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 3px;
}

.grid-num {
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  padding: 6px 2px;
  border-radius: 4px;
  background: rgba(42, 42, 74, 0.6);
  color: #8888aa;
  cursor: pointer;
  min-height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
}

.grid-num.found {
  background: #22c55e;
  color: #fff;
}

.grid-num:active {
  transform: scale(0.9);
}

/* Bottom bar */
.bottom-bar {
  display: flex;
  gap: 8px;
  padding: 8px 0;
  flex-shrink: 0;
}

.bottom-bar .btn-small {
  flex: 1;
  padding: 10px 8px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid rgba(168, 85, 247, 0.3);
  border-radius: 8px;
  background: rgba(42, 42, 74, 0.7);
  color: #a855f7;
  cursor: pointer;
  min-height: 42px;
}

.bottom-bar .btn-small:active {
  transform: scale(0.94);
}

/* Keyboard view */
.keyboard-view {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

.keyboard-view.active {
  display: flex;
}

/* === TOAST === */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(34, 197, 94, 0.92);
  color: #fff;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  z-index: 999;
  pointer-events: none;
  animation: toastIn 0.3s ease;
}

.toast.error {
  background: rgba(239, 68, 68, 0.92);
}

@keyframes toastIn {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
  100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

@keyframes toastOut {
  0% { opacity: 1; }
  100% { opacity: 0; }
}

/* === LEADERBOARD BTN IN TOP BAR === */
.lb-btn {
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid rgba(34, 197, 94, 0.3);
  border-radius: 8px;
  background: rgba(34, 197, 94, 0.1);
  color: #22c55e;
  cursor: pointer;
  min-height: 38px;
  -webkit-appearance: none;
  touch-action: manipulation;
}

.lb-btn:active {
  transform: scale(0.94);
}

.back-btn {
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 600;
  border: 1px solid rgba(168, 85, 247, 0.3);
  border-radius: 8px;
  background: rgba(42, 42, 74, 0.7);
  color: #a855f7;
  cursor: pointer;
  -webkit-appearance: none;
  touch-action: manipulation;
}

.back-btn:active {
  transform: scale(0.94);
}

</style>
</head>
<body>

<!-- NAME SCREEN -->
<div id="name-screen" class="screen">
  <div class="name-logo">🚗 Plate Hunter</div>
  <div class="name-prompt">Как тебя зовут?</div>
  <input type="text" class="name-input" id="name-input" placeholder="Введи имя" maxlength="20">
  <button class="start-btn primary" onclick="saveNameAndContinue()">Продолжить →</button>
</div>

<!-- START SCREEN -->
<div id="start-screen" class="screen">
  <div class="start-logo">🚗 Plate Hunter</div>
  <div class="start-subtitle">Отмечай встречные номера</div>
  <div class="start-player" id="start-player-name"></div>
  <button class="start-btn primary" onclick="startNewGame()">Начать игру</button>
  <button class="start-btn secondary" id="btn-continue" onclick="continueGame()" style="display:none;">Продолжить</button>
  <button class="start-btn tertiary" onclick="showLeaderboard()">🏆 Рейтинг</button>
  <button class="start-btn exit" onclick="changeName()">� Сменить имя</button>
</div>

<!-- LEADERBOARD SCREEN -->
<div id="leaderboard-screen" class="screen">
  <div class="leaderboard-title">🏆 Рейтинг игроков</div>
  <div class="leaderboard-list" id="leaderboard-list">
    <div class="leaderboard-empty">Загрузка...</div>
  </div>
  <button class="btn-small" id="submit-score-btn" onclick="submitScore()" style="flex-shrink:0;border-color:rgba(234,179,8,0.4);color:#fbbf24;background:rgba(234,179,8,0.1);">� Отправить мой результат</button>
  <button class="back-btn" onclick="switchScreen('start-screen')" style="flex-shrink:0;">← Назад</button>
  <div class="leaderboard-status" id="leaderboard-status"></div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <!-- Top bar -->
  <div class="game-top-bar">
    <span class="counter" id="counter-display">0 / 999</span>
    <button class="btn-small" id="mute-btn" onclick="toggleMute()">🔊</button>
        <button class="btn-small" onclick="saveGame()">💾</button>
    <button class="lb-btn" onclick="showLeaderboard()">🏆</button>
    <button class="btn-small" id="view-toggle-btn" onclick="toggleView()">� Вид</button>
    <button class="btn-small" onclick="goToStart()" style="border-color:rgba(239,68,68,0.3);color:#ef4444;">✕</button>
  </div>

  <!-- Keyboard view -->
  <div class="keyboard-view active" id="keyboard-view">
    <!-- Display -->
    <div class="display-area">
      <div class="display-digits" id="display-digits">___</div>
      <div class="display-status" id="display-status"></div>
    </div>

    <!-- Keyboard -->
    <div class="keyboard-area">
      <div class="keyboard-row">
        <button class="key-btn" onclick="pressKey('1')">1</button>
        <button class="key-btn" onclick="pressKey('2')">2</button>
        <button class="key-btn" onclick="pressKey('3')">3</button>
      </div>
      <div class="keyboard-row">
        <button class="key-btn" onclick="pressKey('4')">4</button>
        <button class="key-btn" onclick="pressKey('5')">5</button>
        <button class="key-btn" onclick="pressKey('6')">6</button>
      </div>
      <div class="keyboard-row">
        <button class="key-btn" onclick="pressKey('7')">7</button>
        <button class="key-btn" onclick="pressKey('8')">8</button>
        <button class="key-btn" onclick="pressKey('9')">9</button>
      </div>
      <div class="keyboard-row">
        <button class="key-btn backspace-btn" onclick="pressBackspace()">⌫</button>
        <button class="key-btn" onclick="pressKey('0')">0</button>
        <button class="key-btn ok-btn" onclick="pressOK()">OK</button>
      </div>
    </div>
  </div>

  <!-- Grid view -->
  <div class="grid-view" id="grid-view">
    <div class="grid-full" id="grid-full"></div>
  </div>
</div>

<script>
var LEADERBOARD_URL = 'https://jsonblob.com/api/jsonBlob/019f227d-5d52-721b-adab-f7a66362fd98';

var STATE = {
  found: [],
  startTime: null,
  currentView: 'keyboard',
  currentHundred: null,
  playerName: '',
  lbData: null
};

var DISPLAY_TIMEOUT = null;

function init() {
  STATE.playerName = localStorage.getItem('plateHunterName') || '';
  var saved = localStorage.getItem('plateHunterSave');
  if (saved) {
    try {
      var data = JSON.parse(saved);
      if (data && data.found) {
        STATE.found = data.found;
        STATE.startTime = data.startTime || Date.now();
      }
    } catch(e) {}
  }
  
  if (!STATE.playerName) {
    switchScreen('name-screen');
  } else {
    document.getElementById('start-player-name').textContent = '👤 ' + STATE.playerName;
    switchScreen('start-screen');
    checkContinueBtn();
  }
}

function saveNameAndContinue() {
  var name = document.getElementById('name-input').value.trim();
  if (!name) {
    showToast('Введи имя', true);
    return;
  }
  STATE.playerName = name;
  localStorage.setItem('plateHunterName', name);
  document.getElementById('start-player-name').textContent = '� ' + name;
  switchScreen('start-screen');
  checkContinueBtn();
}

function changeName() {
  document.getElementById('name-input').value = STATE.playerName;
  switchScreen('name-screen');
}

function checkContinueBtn() {
  var btn = document.getElementById('btn-continue');
  if (STATE.found.length > 0) {
    btn.style.display = '';
    btn.textContent = 'Продолжить (' + STATE.found.length + ')';
  } else {
    btn.style.display = 'none';
  }
}

function startNewGame() {
  STATE.found = [];
  STATE.startTime = Date.now();
  switchScreen('game-screen');
  showKeyboard();
  resetDisplay();
  updateCounter();
}

function continueGame() {
  if (STATE.found.length > 0) {
    switchScreen('game-screen');
    if (STATE.currentView === 'grid') {
      showGrid();
    } else {
      showKeyboard();
    }
    resetDisplay();
    updateCounter();
  } else {
    showToast('Нет сохранённой игры', true);
  }
}

// === VIEW TOGGLE (FIXED) ===
function toggleView() {
  if (STATE.currentView === 'keyboard') {
    showGrid();
  } else {
    showKeyboard();
  }
}

function switchScreen(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) {
    screens[i].classList.remove('active');
  }
  document.getElementById(id).classList.add('active');
}

function goToStart() {
  checkContinueBtn();
  switchScreen('start-screen');
}

function saveGame() {
  var data = {
    found: STATE.found,
    startTime: STATE.startTime
  };
  localStorage.setItem('plateHunterSave', JSON.stringify(data));
  showToast('Сохранено! [' + STATE.found.length + ']');
}

// === KEYBOARD ===
function resetDisplay() {
  var el = document.getElementById('display-digits');
  el.textContent = '___';
  el.classList.remove('flash-green', 'flash-red');
  var st = document.getElementById('display-status');
  st.textContent = '';
  st.className = 'display-status';
}

function pressKey(digit) {
  playKeyClick();
  if (DISPLAY_TIMEOUT) { clearTimeout(DISPLAY_TIMEOUT); DISPLAY_TIMEOUT = null; }
  var el = document.getElementById('display-digits');
  var current = el.textContent.replace(/_/g, '');
  if (current.length >= 3) return;
  current += digit;
  el.textContent = current.padEnd(3, '_');
  var st = document.getElementById('display-status');
  st.textContent = '';
  st.className = 'display-status';
}

function pressBackspace() {
  playKeyClick();
  var el = document.getElementById('display-digits');
  var current = el.textContent.replace(/_/g, '');
  if (current.length === 0) return;
  current = current.slice(0, -1);
  el.textContent = current.padEnd(3, '_');
}

function pressOK() {
  var el = document.getElementById('display-digits');
  var val = el.textContent.replace(/_/g, '');
  if (val.length !== 3) return;
  var num = parseInt(val, 10);
  if (num < 1 || num > 999) { showToast('001–999', true); return; }
  var st = document.getElementById('display-status');
  if (STATE.found.indexOf(num) === -1) {
    STATE.found.push(num);
    playNewSound();
    el.classList.remove('flash-green');
    void el.offsetWidth;
    el.classList.add('flash-green');
    st.textContent = '✓ Новый номер!';
    st.className = 'display-status new';
    showToast('✓ ' + pad3(num));
  } else {
    playDuplicateSound();
    el.classList.remove('flash-red');
    void el.offsetWidth;
    el.classList.add('flash-red');
    st.textContent = '✕ Уже есть';
    st.className = 'display-status exists';
    showToast('✕ ' + pad3(num), true);
  }
  updateCounter();
  saveGame();
  if (DISPLAY_TIMEOUT) clearTimeout(DISPLAY_TIMEOUT);
  DISPLAY_TIMEOUT = setTimeout(function() { resetDisplay(); }, 300);
}

function updateCounter() {
  document.getElementById('counter-display').textContent = STATE.found.length + ' / 999';
}

// === GRID VIEW ===
function showGrid() {
  STATE.currentView = 'grid';
  var kv = document.getElementById('keyboard-view');
  var gv = document.getElementById('grid-view');
  kv.style.display = 'none';
  kv.classList.remove('active');
  gv.style.display = 'flex';
  gv.classList.add('active');
  renderFullGrid();
}

function showKeyboard() {
  STATE.currentView = 'keyboard';
  var gv = document.getElementById('grid-view');
  var kv = document.getElementById('keyboard-view');
  gv.style.display = 'none';
  gv.classList.remove('active');
  kv.style.display = 'flex';
  kv.classList.add('active');
  resetDisplay();
}

function renderFullGrid() {
  var container = document.getElementById('grid-full');
  container.innerHTML = '';
  for (var h = 0; h < 10; h++) {
    var hundred = document.createElement('div');
    hundred.className = 'grid-hundred-section';
    var header = document.createElement('div');
    header.className = 'grid-hundred-header';
    var start = h * 100;
    var end = h * 100 + 99;
    if (start === 0) start = 1;
    header.textContent = pad3(start) + ' – ' + pad3(end);
    hundred.appendChild(header);
    var nums = document.createElement('div');
    nums.className = 'grid-numbers';
    for (var n = start; n <= end; n++) {
      var cell = document.createElement('div');
      cell.className = 'grid-num';
      if (STATE.found.indexOf(n) !== -1) {
        cell.className += ' found';
      }
      cell.textContent = pad3(n);
      cell.onclick = (function(num, el) {
        return function() { toggleNumber(num, el); };
      })(n, cell);
      nums.appendChild(cell);
    }
    hundred.appendChild(nums);
    container.appendChild(hundred);
  }
}

function toggleNumber(num, el) {
  var idx = STATE.found.indexOf(num);
  if (idx === -1) {
    STATE.found.push(num);
    el.className = 'grid-num found';
    updateCounter();
    saveGame();
    showToast('✓ ' + pad3(num));
  } else {
    STATE.found.splice(idx, 1);
    el.className = 'grid-num';
    updateCounter();
    saveGame();
    showToast('✕ ' + pad3(num), true);
  }
}

function pad3(n) {
  if (n < 10) return '00' + n;
  if (n < 100) return '0' + n;
  return '' + n;
}

// === TOAST (NO alert()) ===
function showToast(msg, isError) {
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var toast = document.createElement('div');
  toast.className = 'toast';
  if (isError) toast.className += ' error';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function() {
    toast.style.animation = 'toastOut 0.3s ease forwards';
    setTimeout(function() { toast.remove(); }, 300);
  }, 1200);
}

// === LEADERBOARD ===
function showLeaderboard() {
  switchScreen('leaderboard-screen');
  loadLeaderboard();
  // Refresh on focus
  document.getElementById('leaderboard-list').scrollTop = 0;
}

function loadLeaderboard() {
  var list = document.getElementById('leaderboard-list');
  list.innerHTML = '<div class="leaderboard-empty">Загрузка...</div>';
  
  fetch(LEADERBOARD_URL, { method: 'GET' })
    .then(function(r) {
      if (!r.ok) { throw new Error('not found'); }
      return r.json();
    })
    .then(function(data) {
      if (!data) data = { players: [] };
      STATE.lbData = data;
      renderLeaderboard(data);
    })
    .catch(function() {
      list.innerHTML = '<div class="leaderboard-empty">Ошибка загрузки.<br>Проверь интернет.</div>';
    });
}

function renderLeaderboard(data) {
  var list = document.getElementById('leaderboard-list');
  if (!data || !data.players) { data = { players: [] }; }
  var players = data.players;
  
  if (players.length === 0) {
    list.innerHTML = '<div class="leaderboard-empty">Пока никого нет.<br>Будь первым! 🏆</div>';
    document.getElementById('leaderboard-status').textContent = '';
    return;
  }
  
  // sort desc
  players.sort(function(a, b) { return b.count - a.count; });
  
  var html = '';
  for (var i = 0; i < players.length; i++) {
    var p = players[i];
    var rankClass = '';
    var medal = '';
    if (i === 0) { rankClass = 'gold'; medal = '🥇'; }
    else if (i === 1) { rankClass = 'silver'; medal = '🥈'; }
    else if (i === 2) { rankClass = 'bronze'; medal = '🥉'; }
    else { medal = (i + 1) + '.'; }
    
    var isYou = (p.name === STATE.playerName);
    var rowClass = isYou ? 'leaderboard-row you' : 'leaderboard-row';
    var highlight = isYou ? ' ← ты' : '';
    
    html += '<div class="' + rowClass + '">';
    html += '<span class="leaderboard-rank ' + rankClass + '">' + medal + '</span>';
    html += '<span class="leaderboard-name">' + escapeHtml(p.name) + highlight + '</span>';
    html += '<span class="leaderboard-count">' + p.count + '</span>';
    html += '</div>';
  }
  list.innerHTML = html;
  
  var myStat = '';
  if (STATE.found.length > 0) {
    myStat = ' • Твой прогресс: ' + STATE.found.length + ' / 999';
  }
  document.getElementById('leaderboard-status').textContent = 
    'Игроков: ' + players.length + myStat;
}

function submitScore() {
  if (!STATE.playerName || STATE.found.length === 0) {
    showToast('Нет результата', true);
    return;
  }
  
  var lbData = STATE.lbData || { players: [] };
  var players = lbData.players || [];
  
  // find or add
  var found = false;
  for (var i = 0; i < players.length; i++) {
    if (players[i].name === STATE.playerName) {
      players[i].count = STATE.found.length;
      players[i].updated = Date.now();
      found = true;
      break;
    }
  }
  if (!found) {
    players.push({
      name: STATE.playerName,
      count: STATE.found.length,
      updated: Date.now()
    });
  }
  
  lbData.players = players;
  
  // PUT back — text/plain avoids CORS preflight
  fetch(LEADERBOARD_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(lbData)
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    STATE.lbData = data;
    renderLeaderboard(data);
    showToast('Результат сохранён!');
  })
  .catch(function() {
    showToast('Ошибка отправки', true);
  });
}

function escapeHtml(s) {
  var div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// === SOUND SYSTEM ===
var AudioCtx = window.AudioContext || window.webkitAudioContext;
var audioCtx = null;
var soundEnabled = true;

function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new AudioCtx(); } catch(e) {}
  }
  soundEnabled = localStorage.getItem('plateHunterSound') !== 'off';
}

function playKeyClick() {
  if (!soundEnabled || !audioCtx) return;
  try {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 800 + Math.random() * 200;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.08);
  } catch(e) {}
}

function playNewSound() {
  if (!soundEnabled || !audioCtx) return;
  try {
    [523, 659, 784].forEach(function(freq, i) {
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      var t = audioCtx.currentTime + i * 0.12;
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.start(t);
      osc.stop(t + 0.2);
    });
  } catch(e) {}
}

function playDuplicateSound() {
  if (!soundEnabled || !audioCtx) return;
  try {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 200;
    osc.type = 'sawtooth';
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
  } catch(e) {}
}

function toggleMute() {
  soundEnabled = !soundEnabled;
  document.getElementById('mute-btn').textContent = soundEnabled ? '🔊' : '🔇';
  localStorage.setItem('plateHunterSound', soundEnabled ? 'on' : 'off');
}

// === iOS FIX: touch events for buttons ===
function fixIOSTouch() {
  initAudio();
  soundEnabled = localStorage.getItem('plateHunterSound') !== 'off';
  document.getElementById('mute-btn').textContent = soundEnabled ? '🔊' : '🔇';
  
  var btns = document.querySelectorAll('button, .key-btn, .grid-num');
  for (var i = 0; i < btns.length; i++) {
    btns[i].addEventListener('touchend', function(e) {
      e.preventDefault();
      e.target.classList.remove('touching');
      e.target.click();
    }, { passive: false });
    btns[i].addEventListener('touchstart', function(e) {
      e.target.classList.add('touching');
    }, { passive: true });
    btns[i].addEventListener('touchcancel', function(e) {
      e.target.classList.remove('touching');
    }, { passive: true });
  }
}

// === INIT ===
init();
fixIOSTouch();

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}
